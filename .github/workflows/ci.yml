name: CI

on:
    push:
        branches: [main]
        tags: ["v*", "manifest"]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    lint:
        if: github.ref != 'refs/tags/manifest'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v4
            - run: mise run lint
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    test:
        if: github.ref != 'refs/tags/manifest'
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v4
            - run: mise run test

    release-plugin:
        if: startsWith(github.ref, 'refs/tags/v')
        needs: [lint, test]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Package plugin
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  git archive --format=zip --output="moonbit-${VERSION}.zip" "${{ github.ref_name }}"

            - name: Create Release
              uses: softprops/action-gh-release@v3
              with:
                  name: ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  generate_release_notes: true
                  files: |
                      moonbit-*.zip

    release-manifest:
        if: github.ref == 'refs/tags/manifest'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Verify manifest.json exists
              run: test -f manifest.json

            - name: Create Release
              uses: softprops/action-gh-release@v3
              with:
                  name: manifest
                  tag_name: manifest
                  draft: false
                  prerelease: false
                  generate_release_notes: false
                  files: |
                      manifest.json
